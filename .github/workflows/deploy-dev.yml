name: Deploy DEV

on:
  push:
    branches:
      - develop

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli

      - name: Write JWT key to file
        run: |
          echo "${{ secrets.SF_DEV_JWT_KEY }}" > server.key

      - name: Authenticate to DEV
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_DEV_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_DEV_USERNAME }}" \
            --alias mcp-dev

      - name: Deploy to DEV
        run: |
          sf project deploy start \
            --target-org mcp-dev \
            --test-level RunSpecifiedTests \
            --tests ProductServiceTest